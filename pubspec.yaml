name: advanced_chat
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  image_picker: ^1.2.1
  file_picker: ^8.0.3
  path_provider: ^2.1.5
  record: ^6.2.0
  audioplayers: ^6.6.0
  sqflite: ^2.4.2
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  flutter_spinkit: ^5.2.2
  cached_network_image: ^3.4.1
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^21.0.0
  url_launcher: ^6.3.2
  permission_handler: ^12.0.1
  dio: ^5.9.2
  flutter_launcher_icons: ^0.14.4
  google_fonts: ^6.2.1
  receive_sharing_intent: ^1.8.1
  open_filex: ^4.7.0
  share_plus: ^12.0.2
  flutter_linkify: ^6.0.0
  linkify: ^5.0.0
  timezone: ^0.11.0
  flutter_timezone: ^3.0.1
  rxdart: ^0.28.0
  uuid: ^4.5.1
  confetti: ^0.8.0
  google_generative_ai: ^0.4.5
  connectivity_plus: ^6.0.5
  fl_chart: ^0.71.0
  table_calendar: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1a237e"
  adaptive_icon_foreground: "assets/icon.png"
